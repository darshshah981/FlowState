name: Cadence
options:
  bundleIdPrefix: com.darshshah
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.darshshah.Cadence
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Cadence
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: Cadence needs microphone access for push-to-talk dictation.
packages:
  whisper:
    path: Vendor/whisper.spm

targets:
  Cadence:
    type: application
    platform: macOS
    sources:
      - path: Cadence
    dependencies:
      - package: whisper
        product: whisper
    settings:
      base:
        PRODUCT_NAME: Cadence
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - CadenceTests
  CadenceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CadenceTests
    dependencies:
      - target: Cadence
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
